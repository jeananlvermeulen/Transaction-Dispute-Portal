services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: transaction-dispute-db
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: ${DB_PASSWORD}
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${DB_PASSWORD}\" -Q \"SELECT 1\" -No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transaction-dispute-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=TransactionDisputePortal;User Id=sa;Password=${DB_PASSWORD};Trusted_Connection=False;TrustServerCertificate=True;"
      AWS_REGION: us-east-1
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      Jwt__SecretKey: ${JWT_SECRET}
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'printf \"\" > /dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    container_name: transaction-dispute-bff
    environment:
      NODE_ENV: production
      BFF_PORT: "4000"
      BACKEND_URL: http://backend:8080
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transaction-dispute-frontend
    ports:
      - "3000:80"
    depends_on:
      - bff
    networks:
      - app-network
    restart: unless-stopped

volumes:
  sqlserver_data:

networks:
  app-network:
    driver: bridge
